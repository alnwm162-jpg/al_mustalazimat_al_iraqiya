<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>واجهة المتجر</title>
  <style>
    body { font-family: sans-serif; padding: 18px; direction: rtl; background:#f8f9ff; color:#1f2937; }
    .store { max-width: 1024px; margin: 0 auto; }
    .header { display:flex; justify-content: space-between; align-items:flex-start; gap: 16px; flex-wrap: wrap; }
    .products { display:grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 14px; margin-top: 16px; }
    .card { background:white; border:1px solid #e2e8f0; padding:16px; border-radius:14px; box-shadow:0 2px 10px rgba(15,23,42,0.04); }
    .btn { background:#5b21b6; color:white; border:none; padding:10px 16px; border-radius:10px; cursor:pointer; font-weight:600; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .muted { color:#475569; }
    .form-row { margin-bottom:12px; }
    input, select, textarea { width:100%; padding:10px; border-radius:10px; border:1px solid #cbd5e1; font-size:1rem; }
    textarea { resize: vertical; min-height: 100px; }
    .small { font-size: 0.95rem; }
    .section { margin-top: 24px; }
    .cart-summary { margin-top: 16px; }
    .cart-total { font-weight: 700; margin-top: 12px; }
    .alert { background:#eef2ff; border:1px solid #c7d2fe; padding:12px 14px; border-radius:12px; margin-top:16px; }
    label { display:block; margin-bottom:6px; font-weight:600; }
  </style>
</head>
<body>
  <div class="store">
    <div class="header">
      <div>
        <h1 id="store-name">متجر</h1>
        <div id="store-desc" class="muted small">صفحة المتجر لعرض المنتجات وإرسال طلب عبر واتساب.</div>
      </div>
      <div id="store-contact" class="muted small" style="text-align:left;"></div>
    </div>

    <div class="section">
      <h2>المنتجات</h2>
      <div id="products" class="products"></div>
      <div id="no-products" class="muted" style="margin-top:16px; display:none;">لا يوجد منتجات متاحة حالياً.</div>
    </div>

    <div class="section">
      <h2>السلة</h2>
      <div id="cart-items"></div>
      <div class="cart-total">الإجمالي: <span id="cart-total">0 د.ع</span></div>
      <div class="alert">بعد إضافة المنتجات، أدخل الاسم والرقم والعنوان ثم اضغط مشاركة عبر واتساب.</div>
    </div>

    <div class="section">
      <h2>تفاصيل العميل</h2>
      <div class="form-row">
        <label for="customer_name">الاسم</label>
        <input id="customer_name" type="text" placeholder="مثال: علي محسن">
      </div>
      <div class="form-row">
        <label for="customer_phone">الهاتف</label>
        <input id="customer_phone" type="text" placeholder="مثال: 07701234567">
      </div>
      <div class="form-row">
        <label for="customer_address">العنوان</label>
        <textarea id="customer_address" placeholder="مثال: الكرادة، شارع أبي نواس"></textarea>
      </div>
      <div class="form-row">
        <button id="shareBtn" class="btn" disabled>مشاركة الطلب عبر واتساب</button>
      </div>
      <div id="order-status" class="muted small"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://bhyqgohtwtvblmlbwcbb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoeXFnb2h0d3R2YmxtbGJ3Y2JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNTkyMjMsImV4cCI6MjA5NDgzNTIyM30.qeGH6AkRgxnSKJIU3r5LEH94HAJ743-SvZ6g0WkZxg';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const cart = [];

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getSlugFromPath() {
      const path = window.location.pathname;
      const match = path.match(/\/store\/([^\/]+)/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    async function fetchStore(slug, userId) {
      try {
        if (slug) {
          const { data, error } = await supabase.from('stores').select('*').eq('slug', slug).limit(1).maybeSingle();
          if (error) throw error;
          if (data) return data;
        }
        if (userId) {
          const { data, error } = await supabase.from('stores').select('*').eq('user_id', userId).limit(1).maybeSingle();
          if (error) throw error;
          if (data) return data;
        }
      } catch (error) {
        console.error(error);
      }
      return null;
    }

    async function fetchProducts(storeUserId) {
      try {
        const { data, error } = await supabase.from('products').select('*').eq('user_id', storeUserId).order('created_at', { ascending: false });
        if (error) throw error;
        return data || [];
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    function setMessage(text, isError = false) {
      const status = document.getElementById('order-status');
      status.textContent = text;
      status.style.color = isError ? '#b91c1c' : '#1f2937';
    }

    function renderStore(store) {
      document.getElementById('store-name').textContent = store.name || 'متجر';
      document.getElementById('store-desc').textContent = store.description || 'تسوق الآن واضغط مشاركة ليتم إرسال الطلب عبر واتساب.';
      document.getElementById('store-contact').textContent = store.phone ? `رقم المتجر: ${store.phone}` : 'رقم التواصل: 07746582364';
    }

    function renderProducts(products) {
      const productsContainer = document.getElementById('products');
      productsContainer.innerHTML = '';
      if (!products.length) {
        document.getElementById('no-products').style.display = 'block';
        return;
      }
      document.getElementById('no-products').style.display = 'none';
      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
            <strong>${product.name}</strong>
            <span class="muted">${product.price} د.ع</span>
          </div>
          <div class="muted" style="margin:12px 0; min-height:42px;">${product.description || 'بدون وصف'}</div>
          <div class="form-row">
            <label>الكمية</label>
            <input type="number" min="1" value="1" class="item-qty" data-product-id="${product.id}" style="width:100%;">
          </div>
          <button class="btn add-cart" data-product='${JSON.stringify({ id: product.id, name: product.name, price: product.price }).replace(/'/g, '&#39;')}'>أضف إلى السلة</button>
        `;
        productsContainer.appendChild(card);
      });
      attachProductButtons();
    }

    function attachProductButtons() {
      document.querySelectorAll('.add-cart').forEach(button => {
        button.addEventListener('click', () => {
          const product = JSON.parse(button.getAttribute('data-product'));
          const qtyInput = button.parentElement.querySelector('.item-qty');
          const quantity = Math.max(1, Number(qtyInput.value) || 1);
          addToCart(product, quantity);
        });
      });
    }

    function addToCart(product, quantity) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += quantity;
      } else {
        cart.push({ ...product, quantity });
      }
      updateCart();
      setMessage('تمت الإضافة إلى السلة.', false);
    }

    function updateCart() {
      const cartItems = document.getElementById('cart-items');
      const totalElement = document.getElementById('cart-total');
      cartItems.innerHTML = '';
      if (!cart.length) {
        cartItems.innerHTML = '<div class="muted">السلة فارغة، اختر منتجات ثم اضغط أضف إلى السلة.</div>';
        totalElement.textContent = '0 د.ع';
        document.getElementById('shareBtn').disabled = true;
        return;
      }
      document.getElementById('shareBtn').disabled = false;
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      cart.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'card';
        row.innerHTML = `
          <strong>${item.name}</strong>
          <div class="muted">السعر: ${item.price} د.ع</div>
          <div class="form-row" style="margin-top:8px;">
            <label>الكمية</label>
            <input type="number" min="1" value="${item.quantity}" data-index="${index}" class="cart-qty" style="width:100%;">
          </div>
          <div class="muted" style="margin-top:8px;">الإجمالي: ${item.price * item.quantity} د.ع</div>
          <button class="btn remove-item" data-index="${index}" style="background:#dc2626;">إزالة</button>
        `;
        cartItems.appendChild(row);
      });
      totalElement.textContent = `${total} د.ع`;
      attachCartActions();
    }

    function attachCartActions() {
      document.querySelectorAll('.cart-qty').forEach(input => {
        input.addEventListener('change', () => {
          const index = Number(input.dataset.index);
          const value = Math.max(1, Number(input.value) || 1);
          cart[index].quantity = value;
          updateCart();
        });
      });
      document.querySelectorAll('.remove-item').forEach(button => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.index);
          cart.splice(index, 1);
          updateCart();
        });
      });
    }

    function buildWhatsAppText(storeName) {
      const name = document.getElementById('customer_name').value.trim();
      const phone = document.getElementById('customer_phone').value.trim();
      const address = document.getElementById('customer_address').value.trim();
      if (!name || !phone || !address) {
        setMessage('يرجى تعبئة الاسم، الهاتف، والعنوان قبل المشاركة.', true);
        return null;
      }
      if (!cart.length) {
        setMessage('السلة فارغة. أضف منتجاً واحداً على الأقل.', true);
        return null;
      }
      const lines = [];
      lines.push('طلب جديد من متجر: ' + (storeName || ''));
      lines.push('اسم العميل: ' + name);
      lines.push('الهاتف: ' + phone);
      lines.push('العنوان: ' + address);
      lines.push('');
      lines.push('المنتجات:');
      cart.forEach(item => {
        lines.push(`- ${item.name} x ${item.quantity} = ${item.price * item.quantity} د.ع`);
      });
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      lines.push('');
      lines.push('الإجمالي: ' + total + ' د.ع');
      lines.push('');
      lines.push('رابط المتجر: ' + window.location.href);
      return encodeURIComponent(lines.join('\n'));
    }

    function shareOnWhatsApp() {
      const storeName = document.getElementById('store-name').textContent;
      const text = buildWhatsAppText(storeName);
      if (!text) return;
      const phone = '9647746582364';
      const url = `https://wa.me/${phone}?text=${text}`;
      window.open(url, '_blank');
      setMessage('جارٍ فتح واتساب لمشاركة الطلب...', false);
    }

    function showError(message) {
      document.getElementById('store-name').textContent = 'خطأ في العرض';
      document.getElementById('store-desc').textContent = message;
      document.getElementById('products').innerHTML = '';
      document.getElementById('cart-items').innerHTML = '';
      document.getElementById('shareBtn').disabled = true;
    }

    async function initPage() {
      const slug = getQueryParam('slug') || getSlugFromPath();
      const userId = getQueryParam('user_id');
      if (!slug && !userId) {
        showError('يرجى فتح الرابط من رابط المتجر الصحيح.');
        return;
      }
      const store = await fetchStore(slug, userId);
      if (!store) {
        showError('المتجر غير موجود. تحقق من الرابط.');
        return;
      }
      renderStore(store);
      const products = await fetchProducts(store.user_id || store.userId || store.owner_id);
      renderProducts(products);
      document.getElementById('shareBtn').addEventListener('click', shareOnWhatsApp);
      updateCart();
    }

    window.addEventListener('load', initPage);
  </script>
 </body>
 </html>
